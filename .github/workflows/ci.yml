name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify plugin integrity
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    # Windows の cp1252 コンソールで Japanese text / ━ 罫線が
    # UnicodeEncodeError を起こすため、全 Python 実行に UTF-8 を強制する。
    # POSIX では既定が UTF-8 のため no-op。
    env:
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: "1"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.8", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        # openpyxl は template_lib --self-test が一時 xlsx を生成するために必要。
        # プラグイン本体は python stdlib のみで動くが、テンプレ統合テストのみ
        # 実 .xlsx の書き出しを検証する。
        run: python3 -m pip install --upgrade pip && python3 -m pip install openpyxl

      - name: Run verify harness
        run: python3 scripts/verify.py

      - name: Run inheritance-calc unit tests (explicit)
        run: python3 skills/inheritance-calc/test_calc.py

      - name: Run traffic-damage-calc unit tests
        run: python3 skills/traffic-damage-calc/test_calc.py

      - name: Run child-support-calc unit tests
        run: python3 skills/child-support-calc/test_calc.py

      - name: Run debt-recalc unit tests
        run: python3 skills/debt-recalc/test_calc.py

      - name: Run overtime-calc unit tests
        run: python3 skills/overtime-calc/test_calc.py

      - name: Run iryubun-calc unit tests
        run: python3 skills/iryubun-calc/test_calc.py

      - name: Run property-division-calc unit tests
        run: python3 skills/property-division-calc/test_calc.py

      - name: Run workspace.py self-tests
        run: python3 skills/_lib/workspace.py --self-test

      - name: Run audit.py self-tests
        run: python3 skills/_lib/audit.py --self-test

      - name: Run denylist self-tests
        run: python3 skills/_lib/denylist.py self-test

      - name: Run law-search cache self-tests
        run: python3 skills/law-search/search.py self-test

      - name: Run xlsx_writer self-tests
        run: python3 skills/_lib/xlsx_writer.py

      - name: Run template_lib registry integrity check
        run: python3 skills/_lib/template_lib.py --self-test

      - name: Run end-to-end integration tests
        run: python3 scripts/e2e.py

      - name: Validate plugin.json
        shell: python
        run: |
          import json, sys
          with open(".claude-plugin/plugin.json", encoding="utf-8") as f:
              doc = json.load(f)
          required = ["name", "description", "version"]
          missing = [k for k in required if k not in doc]
          if missing:
              sys.exit(f"missing keys: {missing}")

      - name: Validate .mcp.json has pinned versions
        shell: python
        run: |
          import json, re, sys
          with open(".mcp.json", encoding="utf-8") as f:
              doc = json.load(f)
          unpinned = []
          for name, cfg in doc.get("mcpServers", {}).items():
              for a in cfg.get("args", []):
                  if a.startswith("-"):
                      continue
                  if "-mcp-server" in a or "-report-server" in a:
                      if not re.search(r"@\d+\.\d+\.\d+", a):
                          unpinned.append(f"{name}: {a}")
          if unpinned:
              sys.exit(f"unpinned MCP packages: {unpinned}")

  lint-shell:
    name: Lint shell snippets in skill docs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Check for removed dangerous patterns
        run: |
          # These patterns were removed in the security hardening pass
          # and should not be reintroduced. Scope the checks carefully —
          # we only want to flag actual permission grants or executable
          # snippets, not prose explanations of why we don't use them.
          set -e

          # Fail if any command grants broad python3:* bash permission.
          if grep -rn "allowed-tools:.*Bash(python3:\\*)" commands/; then
            echo "ERROR: Broad 'Bash(python3:*)' permission in a command."
            echo "Use specific script paths, e.g. Bash(python3 skills/foo/bar.py:*)"
            exit 1
          fi

          # Fail if any command grants Bash(python3 -c ...) permission.
          if grep -rn "allowed-tools:.*Bash(python3 -c" commands/; then
            echo "ERROR: 'Bash(python3 -c ...)' permission grants arbitrary code exec."
            exit 1
          fi

          # Fail if any command grants broad curl:* bash permission.
          if grep -rn "allowed-tools:.*Bash(curl:\\*)" commands/; then
            echo "ERROR: Broad 'Bash(curl:*)' permission in a command."
            exit 1
          fi

          # Fail if any command grants Bash(cp:*) — not portable to Windows.
          # Use python3 skills/_lib/copy_file.py instead.
          if grep -rn "allowed-tools:.*Bash(cp:\\*)" commands/; then
            echo "ERROR: 'Bash(cp:*)' permission — not available on Windows."
            echo "Use python3 skills/_lib/copy_file.py instead."
            exit 1
          fi

          # Enforce MCP package hygiene:
          #   1. All MCP/report servers must be pinned to an explicit X.Y.Z version.
          #   2. All MCP/report servers must be scoped (@knorq/...) — unscoped
          #      names are hijackable on npm and are forbidden since v1.1.
          python3 - <<'PY'
          import json, re, sys
          doc = json.load(open(".mcp.json"))
          problems = []
          for name, cfg in doc.get("mcpServers", {}).items():
              for a in cfg.get("args", []):
                  if a.startswith("-"):
                      continue
                  if "-mcp-server" in a or "-report-server" in a:
                      # Must be pinned to exact version.
                      if not re.search(r"@\d+\.\d+\.\d+", a):
                          problems.append(f"unpinned: {name} -> {a}")
                      # Must be scoped — leading '@' before package name.
                      if not a.startswith("@"):
                          problems.append(f"unscoped: {name} -> {a} (use @knorq/...)")
          if problems:
              for p in problems:
                  print(f"ERROR: {p}")
              sys.exit(1)
          PY

          echo "All pattern checks passed."

  ci-summary:
    # Single stable status-check context for branch protection. Failing matrix
    # legs (verify) or lint-shell cause this to fail via the skipped/failed
    # result-check below.
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: [verify, lint-shell]
    if: always()
    steps:
      - name: Aggregate result
        run: |
          if [ "${{ needs.verify.result }}" != "success" ] || \
             [ "${{ needs.lint-shell.result }}" != "success" ]; then
            echo "verify=${{ needs.verify.result }} lint-shell=${{ needs.lint-shell.result }}"
            exit 1
          fi
          echo "All required jobs passed."
