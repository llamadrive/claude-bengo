# claude-bengo 同梱テンプレートレジストリ
#
# このファイルは `/template-install` が参照する同梱テンプレートの索引である。
# 新規テンプレートを追加する場合:
#   1. `templates/_bundled/{id}/` ディレクトリを作成
#   2. `{id}.yaml`（フィールド定義）と `{id}.xlsx`（XLSX 雛形）を置く
#   3. 本ファイルに `- id: {id}` 以下のブロックを追加
#
# フィールド:
#   id            — 同梱テンプレートの ID（英数字・ハイフン・アンダースコア）
#   title         — 人間可読名（日本語）
#   category      — 分類（民事訴訟 / 家事事件 / 交通事故 / 相続 / 労働 / 破産・再生 / 契約 等）
#   description   — 用途の1-2文説明
#   use_cases     — 実務での使用場面（複数行、オプショナル）
#   legal_basis   — 法的根拠・準拠標準（オプショナル）
#   author        — 作成者（LlamaDrive 同梱は LlamaDrive / Claude）
#   version       — テンプレート版 (SemVer)
#
# 注意: 実際の裁判所書式と完全に一致しない場合がある。提出前に最新の
# 裁判所ホームページで書式を確認すること。レイアウトは参考用。

templates:

  - id: creditor-list
    title: 債権者一覧表
    category: 破産・再生
    description: 自己破産・個人再生申立に添付する債権者一覧表の雛形
    use_cases: |
      - 自己破産申立書に添付（破産法 20条・同施行規則 13条）
      - 個人再生申立書に添付（民事再生法 221条）
      - 任意整理交渉時の現状把握
    legal_basis: 破産法・民事再生法の申立書添付書類
    author: LlamaDrive
    version: "1.0.0"

  - id: estate-inventory
    title: 遺産目録
    category: 相続
    description: 遺産分割協議・相続放棄の検討に用いる財産目録
    use_cases: |
      - 遺産分割協議の前提資料
      - 限定承認の申述書に添付（家事事件手続法 201条）
      - 遺産分割審判の資料
    legal_basis: 民法 896条以下（相続財産の範囲）、家事事件手続法 192条
    author: LlamaDrive
    version: "1.0.0"

  - id: settlement-traffic
    title: 交通事故示談書（雛形）
    category: 交通事故
    description: |
      交通事故の損害賠償請求に係る示談書の基本雛形。
      注意: 清算条項「今後名目を問わず互いに何らの請求もしない」は本雛形に含まれるが、
      治療継続中・後遺障害未確定の事案では「ただし、本示談成立時に予見できなかった
      後遺障害についてはこの限りでない」の但書を手動追加することを強く推奨する。
    use_cases: |
      - 任意保険会社との示談交渉後の合意書面
      - 加害者との直接交渉後の合意書面
      - 公正証書化前の草案
    legal_basis: 民法 695条（和解）、民法 709条（不法行為）、自賠責保険法
    author: LlamaDrive
    version: "1.0.1"

  - id: divorce-agreement
    title: 離婚協議書
    category: 家事事件
    description: 協議離婚時の合意書面（草案）。親権・養育費・面会交流・財産分与・慰謝料・年金分割を網羅
    use_cases: |
      - 協議離婚の合意内容の書面化
      - 公証役場で公正証書化する前の草案
      - 調停申立前の整理資料
    legal_basis: 民法 763/766/768条、厚生年金保険法 78条の2
    author: LlamaDrive
    version: "1.0.0"

  - id: naiyou-shoumei
    title: 内容証明郵便（通知書）
    category: 一般民事
    description: 横書き 26字×20行形式の内容証明郵便雛形。差出人・受取人・表題・本文を構造化
    use_cases: |
      - 催告書・通知書・解除通知等の送付
      - 時効中断目的の催告
      - 契約解除の意思表示
    legal_basis: 郵便法 48条・49条、民法 150条（催告による時効中断）
    author: LlamaDrive
    version: "1.0.0"

  - id: overtime-calc-sheet
    title: 未払残業代計算書
    category: 労働
    description: 労基法37条に基づく割増賃金の月別計算書。時効3年に対応
    use_cases: |
      - 労働審判・訴訟の証拠資料
      - 任意交渉の請求額算定
      - 内容証明による請求の根拠資料
    legal_basis: 労働基準法 37条・115条（改正後時効3年）、同施行規則 19条
    author: LlamaDrive
    version: "1.0.0"

  - id: complaint-loan-repayment
    title: 訴状（貸金返還請求）
    category: 民事訴訟
    description: 貸金返還請求の訴状雛形。民訴法134条の必要的記載事項を網羅
    use_cases: |
      - 消費者金融・個人間貸付の回収訴訟
      - 裁判所提出書類の雛形
    legal_basis: 民事訴訟法 134条、民事訴訟規則 53条
    author: LlamaDrive
    version: "1.0.0"

  - id: answer-generic
    title: 答弁書（民事訴訟）
    category: 民事訴訟
    description: 民事訴訟の答弁書雛形。請求の趣旨に対する答弁・原因に対する認否・抗弁を構造化
    use_cases: |
      - 第1回口頭弁論期日前の答弁書提出
      - 請求認否の記録
    legal_basis: 民事訴訟規則 80条
    author: LlamaDrive
    version: "1.0.0"

  - id: inheritance-renunciation
    title: 相続放棄申述書
    category: 相続
    description: 家庭裁判所提出用の相続放棄申述書。3ヶ月の熟慮期間起算日に留意
    use_cases: |
      - 被相続人の債務超過時の相続放棄
      - 他の相続人に集中させる目的の放棄
    legal_basis: 民法 915条（熟慮期間）、民法 938条、家事事件手続法 201条
    author: LlamaDrive
    version: "1.0.0"

  - id: inheritance-division-agreement
    title: 遺産分割協議書
    category: 相続
    description: 相続人全員の合意による遺産分割の書面。不動産の相続登記等で使用
    use_cases: |
      - 遺産分割協議成立後の書面化
      - 不動産の相続登記申請
      - 預貯金の名義変更
    legal_basis: 民法 906条・907条
    author: LlamaDrive
    version: "1.0.0"

  - id: power-of-attorney
    title: 委任状（弁護士）
    category: 汎用
    description: 弁護士への事件処理委任。特別委任事項（民訴55条2項）の個別承諾欄を含む
    use_cases: |
      - 訴訟・調停・審判等の代理人選任
      - 特別委任事項（和解・取下げ等）の明示的承諾
    legal_basis: 弁護士法、民事訴訟法 55条
    author: LlamaDrive
    version: "1.0.0"

  - id: bankruptcy-dohaishi
    title: 破産申立書（同時廃止型・個人）
    category: 破産・再生
    description: 個人の自己破産（同時廃止）の申立書雛形。債権者一覧表と財産目録を別紙で添付
    use_cases: |
      - 支払不能に陥った個人債務者の自己破産申立
      - 免責許可の同時申立
    legal_basis: 破産法 15条・20-25条・216条、破産規則 13条
    author: LlamaDrive
    version: "1.0.0"

  - id: labor-tribunal-application
    title: 労働審判申立書
    category: 労働
    description: 労働審判法に基づく申立書。3期日以内の迅速手続を想定
    use_cases: |
      - 解雇無効確認・地位確認
      - 未払賃金・残業代請求
      - 雇止め訴訟の前段階
    legal_basis: 労働審判法 5条・15条・33条、労働審判規則 9条
    author: LlamaDrive
    version: "1.0.0"

  - id: statement-family
    title: 陳述書（家事事件）
    category: 家事事件
    description: 家事調停・審判における当事者の陳述書。離婚・遺産分割・後見等で使用
    use_cases: |
      - 家事調停での事情説明
      - 家事審判の資料
      - 遺産分割調停での当事者主張
    legal_basis: 家事事件手続法 56条、民事訴訟法 215条
    author: LlamaDrive
    version: "1.0.0"

  - id: family-mediation-application
    title: 家事調停申立書（夫婦関係調整等）
    category: 家事事件
    description: 離婚・養育費・面会交流・婚姻費用等の家事調停申立書雛形
    use_cases: |
      - 離婚調停の申立
      - 調停前置主義に基づく訴訟前申立
      - 夫婦関係の調整
    legal_basis: 家事事件手続法 244条・255条・257条、家事審判規則 129条
    author: LlamaDrive
    version: "1.0.0"

  - id: household-budget
    title: 家計収支表
    category: 破産・再生
    description: 自己破産・個人再生の申立添付資料。通常2-3ヶ月分を並べて提出
    use_cases: |
      - 自己破産申立の添付資料
      - 個人再生申立の添付資料
      - 任意整理の返済計画作成時の現状把握
    legal_basis: 破産規則 13条、民事再生規則 104条（添付資料の一般規定）
    author: LlamaDrive
    version: "1.0.0"

  - id: rehabilitation-small
    title: 個人再生申立書（小規模再生）
    category: 破産・再生
    description: 民事再生法 221条以下の小規模個人再生申立書。住宅資金特別条項の選択可
    use_cases: |
      - 住宅ローンを維持したままの債務整理
      - 自己破産に代わる選択肢
      - 負債総額5,000万円以下の債務者
    legal_basis: 民事再生法 221-245条、同規則 100条以下、民再 196-206条（住宅特別条項）
    author: LlamaDrive
    version: "1.0.0"

  - id: criminal-defense-appointment
    title: 弁護人選任届
    category: 刑事弁護
    description: 刑事事件の弁護人選任届。被疑者段階・被告人段階・公判段階で都度提出
    use_cases: |
      - 被疑者段階の弁護人選任
      - 起訴後の弁護人選任
      - 上訴審の弁護人選任
    legal_basis: 刑事訴訟法 30条・32条、刑訴規則 17条
    author: LlamaDrive
    version: "1.0.0"

  - id: criminal-settlement
    title: 示談書（刑事事件）
    category: 刑事弁護
    description: 刑事事件における被害者との示談書。宥恕・告訴取下げ条項を含む
    use_cases: |
      - 起訴前の不起訴処分獲得
      - 起訴後の執行猶予・減刑獲得
      - 親告罪における告訴取下げ
    legal_basis: 民法 709条（損害賠償）、刑事訴訟法 262条（告訴取下げ）、量刑実務
    author: LlamaDrive
    version: "1.0.0"

  - id: guardianship-application
    title: 後見開始申立書
    category: 家事事件
    description: 成年後見開始の審判申立書。後見・保佐・補助の類型に対応
    use_cases: |
      - 認知症の高齢者の成年後見
      - 知的障害者の成年後見
      - 精神障害者の保佐・補助
    legal_basis: 民法 7条・11条・15条、家事事件手続法 117-136条
    author: LlamaDrive
    version: "1.0.0"

  - id: payment-demand
    title: 支払督促申立書
    category: 民事訴訟
    description: 金銭支払請求の簡易手続。書面審査のみで債務名義を取得
    use_cases: |
      - 売掛金・貸付金の回収
      - 家賃滞納の請求
      - 通常訴訟より費用・時間を抑えた回収
    legal_basis: 民事訴訟法 382条以下、同 395条（異議時の通常訴訟移行）
    author: LlamaDrive
    version: "1.0.0"

  - id: child-support-application
    title: 養育費請求調停申立書
    category: 家事事件
    description: 離婚後または別居中の養育費請求の調停申立書
    use_cases: |
      - 離婚後の養育費請求
      - 協議不成立時の調停申立
      - 既存の養育費取決めの変更請求
    legal_basis: 民法 766条・877条、家事事件手続法 244条、令和元年改定算定方式
    author: LlamaDrive
    version: "1.0.0"

  - id: spousal-support-application
    title: 婚姻費用分担請求調停申立書
    category: 家事事件
    description: 別居中の夫婦間における婚姻費用分担請求の調停申立書
    use_cases: |
      - 別居中の生活費請求
      - 離婚調停と並行して申立
      - 離婚前の経済的保護
    legal_basis: 民法 760条、家事事件手続法 244条、令和元年改定婚姻費用算定方式
    author: LlamaDrive
    version: "1.0.0"

  - id: shareholder-meeting-minutes
    title: 株主総会議事録
    category: 企業法務
    description: 定時・臨時株主総会の議事録雛形。会社法 318条の本店 10年間備置義務対応
    use_cases: |
      - 定時株主総会後の議事録作成
      - 臨時株主総会後の議事録作成
      - 株主総会決議事項の記録保存
    legal_basis: 会社法 318条、会社法施行規則 72条
    author: LlamaDrive
    version: "1.0.0"

  - id: board-meeting-minutes
    title: 取締役会議事録
    category: 企業法務
    description: 取締役会議事録雛形。出席取締役・監査役の記名押印対応
    use_cases: |
      - 取締役会決議事項の記録
      - 重要事項決議の証拠資料
    legal_basis: 会社法 369条 3項、会社法施行規則 101条
    author: LlamaDrive
    version: "1.0.0"

  - id: small-claims-complaint
    title: 訴状（少額訴訟）
    category: 民事訴訟
    description: 60万円以下の金銭請求に使う少額訴訟訴状。1回期日で判決
    use_cases: |
      - 敷金返還請求
      - 未払賃金請求
      - 少額の貸金返還
    legal_basis: 民事訴訟法 368-375条
    author: LlamaDrive
    version: "1.0.0"

  - id: immediate-settlement
    title: 即決和解申立書（訴え提起前の和解）
    category: 民事訴訟
    description: 起訴前の和解申立書。確定判決と同一効力の和解調書を取得
    use_cases: |
      - 交渉成立済みの紛争を執行力付き和解調書として固定
      - 任意履行が見込めない和解内容の強制執行備え
    legal_basis: 民事訴訟法 275条・267条
    author: LlamaDrive
    version: "1.0.0"

  - id: criminal-statement
    title: 陳述書（刑事事件）
    category: 刑事弁護
    description: 刑事公判での陳述書雛形。被告人・被害者・親族・雇主・嘆願者用
    use_cases: |
      - 情状弁護資料
      - 被害者の意見書
      - 親族・雇主による監督誓約書
    legal_basis: 刑事訴訟法 321条以下（書面の証拠能力）、量刑実務
    author: LlamaDrive
    version: "1.0.0"

  - id: contract-review-checklist
    title: 契約書レビューチェックリスト
    category: 企業法務
    description: 一般契約書のレビュー時の標準チェック項目。17項目の事前洗い出しリスト
    use_cases: |
      - 新規契約書のレビュー
      - 既存契約の見直し
      - 法務部員の標準業務
    legal_basis: 民法 416条・562-564条、個人情報保護法 27条、独禁法 等
    author: LlamaDrive
    version: "1.0.0"

  - id: work-regulations-template
    title: 就業規則（簡易版テンプレート）
    category: 企業法務
    description: 労基法 89条の必要記載事項を網羅した就業規則雛形。10人以上事業場で必要
    use_cases: |
      - 新規事業場の就業規則作成
      - 既存規則の見直し時の比較資料
      - 中小企業のベースライン作成
    legal_basis: 労基法 89条・90条・92条、高年齢者雇用安定法 8条
    author: LlamaDrive
    version: "1.0.0"

  - id: employment-contract
    title: 労働契約書
    category: 労働
    description: 労基法 15条の明示事項を網羅した労働契約書雛形。正社員・契約社員両対応
    use_cases: |
      - 採用時の労働条件通知と契約書化
      - 契約社員の契約期間明示
      - 労働条件のエビデンス化
    legal_basis: 労基法 15条 1項、労基法施行規則 5条、労働契約法 4条
    author: LlamaDrive
    version: "1.0.0"
