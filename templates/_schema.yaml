# LawyerSet テンプレート定義スキーマ
#
# このファイルはフォーマット仕様のドキュメントであり、実テンプレートではない。
# テンプレートは /template-create コマンドで自動生成されるか、手動で作成する。
# 各テンプレートは {id}.yaml + {id}.xlsx のペアで管理する。
#
# 使用方法:
#   1. /template-create でXLSXからテンプレートを登録する
#   2. /template-list で登録済みテンプレートを確認する
#   3. /template-fill でソース文書からデータを抽出しテンプレートに入力する

# --- テンプレート定義の構造 ---

id: string           # 一意識別子。ファイル名と一致する（例: "traffic-accident-complaint"）
title: string        # テンプレート名（日本語。例: "交通事故訴状"）
description: string  # 説明（1-2文）
category: string     # カテゴリ（自由記述: 民事訴訟, 家事事件, 交通事故, 相続, 労働, 破産 等）
templateFile: string # ベースXLSXファイル名（同ディレクトリ内。例: "traffic-accident-complaint.xlsx"）

fields:              # 入力フィールドのリスト
  - id: string       # フィールドID（英数字スネークケース。例: "plaintiff_name"）
    label: string    # 表示名（日本語。例: "原告氏名"）
    type: string     # フィールドタイプ: text | number | date | textarea | select | table
    required: boolean # 必須フィールドか（true / false）

    # --- マッピング補助（任意、推奨。v3.2.0〜） ---
    #
    # description と synonyms は、/template-fill がソース PDF から値を抽出する際に
    # フィールドの意味を LLM へ伝えるためのヒント。label だけでは曖昧な場合に
    # 抽出精度が向上する（例: 「氏名」だけでは原告/被告/債権者/債務者のどれか
    # 分からない → description に「債務者の戸籍上の氏名」と書く）。
    description: string   # 1-2 文の詳細説明（任意）
    synonyms: [string, ...] # ソース文書で使われそうな別名・類義語（任意）
                            # 例: ["債務者氏名", "借主", "お名前", "契約者名"]
    example_value: string  # 記入例（任意。text/number/date のみ）
                           # 例: "甲野太郎" / "1,000,000" / "令和5年3月1日"
    # --- /マッピング補助 ---

    # --- 単一セルフィールド（type が table 以外の場合） ---
    position:          # セル位置（1-indexed）
      row: number      # 行番号（1から開始）
      column: number   # 列番号（1=A, 2=B, 3=C, ...）

    # --- テーブルフィールド（type が table の場合） ---
    range:             # テーブル範囲（1-indexed）
      headerRow: number    # ヘッダ行（列ラベルがある行。例: №, 名称, 金額 等）
      dataStartRow: number # データ開始行（最初のデータを書き込む行。headerRow + 1 が一般的）
      startColumn: number
      endRow: number       # データ最終行（この行以降にはデータを書かない）
      endColumn: number
    columns:           # テーブルの列定義
      - id: string     # 列ID（英数字スネークケース）
        label: string  # 列名（日本語）
        type: string   # 列のデータ型: text | number | date
        description: string   # 列の説明（任意）
        synonyms: [string, ...] # ソース文書での別名（任意、v3.2.0〜）
        example_value: string   # 記入例（任意、v3.2.0〜）

    # --- 選択フィールド（type が select の場合） ---
    options:           # 選択肢のリスト
      - string

# --- 例 ---
